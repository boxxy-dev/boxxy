name: Feature Request
description: Suggest an idea for Boxxy Terminal
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Thanks for taking the time to suggest an enhancement!
        > Please search [existing issues](../../issues) to see if it was already requested.

  - type: textarea
    id: feature
    attributes:
      label: What would you like to be added?
      description: A clear and concise description of the feature.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this needed?
      description: A clear and concise description of why this enhancement is needed.
    validations:
      required: true
