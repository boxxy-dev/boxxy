name: Bug Report
description: Report a bug to help us improve Boxxy Terminal
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Thanks for taking the time to fill out this bug report!
        > Please search [existing issues](../../issues) to see if it was already reported.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: A clear and concise description of the expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: Found in Preferences → About
    validations:
      required: true

  - type: dropdown
    id: build
    attributes:
      label: Build
      options:
        - Native
        - Flatpak
    validations:
      required: true

  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: e.g. Fish, Zsh, Bash
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model (if relevant)
      description: Only fill in if this issue relates to AI model behavior.
      placeholder: e.g. Claude, Ollama/Qwen
