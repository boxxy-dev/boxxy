name: flatpak

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  flatpak:
    name: "Flatpak"
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: short_sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Generate flatpak sources (python container)
        uses: docker://python:3.11
        with:
          args: >
            bash -lc "set -e;
            pip install --no-cache-dir aiohttp toml tomlkit &&
            python3 flatpak/flatpak-cargo-generator.py Cargo.lock -o flatpak/cargo-sources.json

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          repository-name: gnome-nightly
          repository-url: https://nightly.gnome.org/gnome-nightly.flatpakrepo
          bundle: boxxy-${{ matrix.variant.arch }}-${{ steps.short_sha.outputs.short }}.flatpak
          manifest-path: flatpak/dev.boxxy.BoxxyTerminal.yml
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: flatpak-${{ matrix.variant.arch }}
          path: |
            LICENSE
            *.flatpak

  prerelease:
    name: "build"
    needs: [flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Download flatpak artifacts into workspace root
        uses: actions/download-artifact@v4
        with:
          pattern: flatpak-*
          merge-multiple: true
          path: .

      - uses: dciborow/action-github-releases@v1.0.1
        with:
          repo_token: "${{ secrets.RELEASE_TOKEN }}"
          prerelease: true
          automatic_release_tag: "latest"
          title: "Pre-release"
          files: |
            LICENSE
            *.flatpak
