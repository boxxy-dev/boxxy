name: "FSM: Hard Wake Degraded Fallback"
timeout_sec: 90
panes:
  - id: "dreamer"
    name: "Sleeping Agent"
steps:
  # 1. Start agent and immediately put it to sleep
  - action: "prompt"
    pane: "dreamer"
    prompt: "Use `set_agent_state` with 'sleep'. Goodbye."
  
  - action: "wait_for_status"
    pane: "dreamer"
    status: "Sleep"
    timeout_sec: 20

  # 2. Simulate User working manually (Injecting raw history)
  - action: "inject_terminal_output"
    pane: "dreamer"
    output: "$ cargo build (exit: 0)\n$ cargo test (exit: 1)\n$ rustc --explain E0382\n"
  
  - action: "sleep"
    seconds: 2

  # 3. Simulate User sending an unexpected DB/LLM drop (We can't easily mock DB here, but 
  # we can just hit Ctrl+/ to wake up. To test 'Degraded', we would need to mock `memory_model` failure.
  # Let's just test that the Wake protocol successfully brings it out of Sleep without locking up.)
  - action: "prompt"
    pane: "dreamer"
    prompt: "Wake up and tell me what I just typed."
  
  # It should go Sleep -> Working (Summarizing) -> Waiting
  - action: "wait_for_status"
    pane: "dreamer"
    status: "Working"
    timeout_sec: 10

  - action: "wait_for_status"
    pane: "dreamer"
    status: "Waiting"
    timeout_sec: 40

assertions:
  # Just verify it survived the FSM transitions
  - type: "command_exit_code"
    command: "echo 'ALIVE' > status.txt"
    expected_code: 0
